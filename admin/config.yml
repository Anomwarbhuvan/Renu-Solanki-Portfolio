backend:
  name: git-gateway
  branch: main

# Where uploaded images are stored in the repo and served from
media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "blogs"
    label: "Blogs"
    folder: "src/blogs"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM DD, YYYY"
        time_format: false

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Tech",                    value: "tech" }
          - { label: "Edtech",                  value: "edtech" }
          - { label: "MarTech",                 value: "martech" }
          - { label: "Educational/Study Abroad", value: "educational" }
          - { label: "Fiction",                 value: "fiction" }
          - { label: "Travel & Lifestyle",      value: "travel-lifestyle" }
          - { label: "Entertainment",           value: "entertainment" }
          - { label: "Gastronomy",              value: "gastronomy" }
          - { label: "Culture & Tradition",     value: "culture-tradition" }
          - { label: "Personal Reflection",     value: "personal-reflection" }

      - label: "Sub-category"
        name: "subcategory"
        widget: "select"
        required: false
        hint: "Pick a sub-category if applicable. Only Tech and Fiction have sub-categories."
        options:
          - { label: "— Tech —",                          value: "" }
          - { label: "AI",                                value: "ai" }
          - { label: "Gaming Industry",                   value: "gaming-industry" }
          - { label: "Cybersecurity",                     value: "cybersecurity" }
          - { label: "— Fiction —",                       value: "" }
          - { label: "Psychological/Suspense Thriller",   value: "psychological-thriller" }
          - { label: "Kid Fiction",                       value: "kid-fiction" }
          - { label: "Romantic Stories",                  value: "romantic-stories" }
          - { label: "Literary Analysis",                 value: "literary-analysis" }

      - label: "Thumbnail"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "Cover image for the blog card and hero. Upload from your desktop or paste a URL."

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        hint: "Short description shown on blog cards (1–2 sentences)"

      - label: "Subtitle"
        name: "subtitle"
        widget: "string"
        required: false
        hint: "Shown in italic below the title on the blog page"

      - label: "Card Icon (emoji)"
        name: "icon"
        widget: "string"
        default: "✍️"
        hint: "Emoji shown on the blog card thumbnail (e.g. ✍️ ❤️ 🤖 ✨)"

      - label: "Card Gradient"
        name: "gradient"
        widget: "select"
        default: "1"
        hint: "Background colour of the blog card thumbnail"
        options:
          - { label: "Lilac",        value: "1" }
          - { label: "Sky Blue",     value: "2" }
          - { label: "Lilac → Sky",  value: "3" }
          - { label: "Pale Sky",     value: "4" }
          - { label: "Pale Lilac",   value: "5" }
          - { label: "Indigo",       value: "6" }

      - label: "SEO Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Optional — overrides the excerpt for search engine previews"

      - label: "Body"
        name: "body"
        widget: "markdown"
